# alembic.ini
# Alembic configuration for VCAI.
#
# The database URL is NOT set here. It is loaded at runtime in alembic/env.py
# from backend.config.get_settings().database_url (same source as the app), so
# there is no secret in this file.

[alembic]
# Path to migration scripts, relative to this file (repo root).
# Named "migrations" (not "alembic") so it does not shadow the installed
# alembic package when commands run from the repo root.
script_location = migrations

# Template used to generate migration file names.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for timestamps in migration files. Empty = local time.
# timezone =

# Max length of characters to apply to the "slug" field.
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Version path separator; os.pathsep by default.
version_path_separator = os

# The sqlalchemy.url is intentionally left blank — env.py injects it from app settings.
sqlalchemy.url =


[post_write_hooks]
# Optional code formatting hooks; none configured.


# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
